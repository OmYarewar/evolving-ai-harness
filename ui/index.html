<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Harness - Evolving UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: {
                            bg: '#0f172a',
                            panel: '#1e293b',
                            border: '#334155'
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/static/style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-dark-bg text-slate-200 h-screen flex flex-col font-sans overflow-hidden">
    
    <!-- Top Navigation -->
    <header class="bg-dark-panel border-b border-dark-border h-14 flex items-center justify-between px-4 shrink-0">
        <div class="flex items-center gap-2 text-indigo-400 font-bold text-lg">
            <i data-lucide="cpu"></i> AI Harness
        </div>
        <div class="flex items-center gap-4">
            <button id="btn-settings" class="p-2 hover:bg-slate-700 rounded-md transition-colors text-slate-400 hover:text-white" title="Settings">
                <i data-lucide="settings"></i>
            </button>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="flex-1 flex overflow-hidden">
        
        <!-- Sidebar: Sessions -->
        <aside class="w-64 bg-dark-panel border-r border-dark-border flex flex-col hidden sm:flex shrink-0">
            <div class="p-3 border-b border-dark-border">
                <button id="btn-new-chat" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-2 px-4 rounded flex items-center justify-center gap-2 transition-colors">
                    <i data-lucide="plus" class="w-4 h-4"></i> New Chat
                </button>
            </div>
            <div id="session-list" class="flex-1 overflow-y-auto p-2 space-y-1">
                <!-- Sessions will be injected here -->
            </div>
        </aside>

        <!-- Chat Area -->
        <section class="flex-1 flex flex-col relative h-full min-w-0">
            <!-- Messages -->
            <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-6 pb-32 scroll-smooth">
                <div class="flex justify-center items-center h-full text-slate-500">
                    <div class="text-center">
                        <i data-lucide="bot" class="w-12 h-12 mx-auto mb-2 opacity-50"></i>
                        <p>How can I help you evolve today?</p>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-dark-bg via-dark-bg to-transparent">
                <form id="chat-form" class="max-w-4xl mx-auto relative bg-dark-panel border border-dark-border rounded-xl shadow-lg focus-within:border-indigo-500 transition-colors">
                    <textarea id="chat-input" rows="1" class="w-full bg-transparent text-white p-4 pr-12 focus:outline-none resize-none max-h-32 rounded-xl" placeholder="Send a message..." required></textarea>
                    <button type="submit" class="absolute bottom-3 right-3 p-1.5 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-white transition-colors disabled:opacity-50">
                        <i data-lucide="send" class="w-4 h-4"></i>
                    </button>
                </form>
            </div>
        </section>

    </main>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 backdrop-blur-sm">
        <div class="bg-dark-panel border border-dark-border rounded-xl shadow-2xl w-full max-w-lg mx-4 flex flex-col">
            <div class="flex items-center justify-between p-4 border-b border-dark-border">
                <h2 class="text-xl font-semibold flex items-center gap-2"><i data-lucide="sliders"></i> Settings</h2>
                <button id="btn-close-settings" class="text-slate-400 hover:text-white"><i data-lucide="x"></i></button>
            </div>
            <div class="p-6 space-y-4 flex-1 overflow-y-auto">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Base URL</label>
                    <input type="text" id="config-base-url" class="w-full bg-slate-800 border border-dark-border rounded px-3 py-2 text-white focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">API Key</label>
                    <input type="password" id="config-api-key" class="w-full bg-slate-800 border border-dark-border rounded px-3 py-2 text-white focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Model ID</label>
                    <input type="text" id="config-model" class="w-full bg-slate-800 border border-dark-border rounded px-3 py-2 text-white focus:outline-none focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">System Prompt</label>
                    <textarea id="config-system-prompt" rows="4" class="w-full bg-slate-800 border border-dark-border rounded px-3 py-2 text-white focus:outline-none focus:border-indigo-500"></textarea>
                </div>
            </div>
            <div class="p-4 border-t border-dark-border flex justify-end gap-2">
                <button id="btn-save-settings" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded transition-colors">Save Configurations</button>
            </div>
        </div>
    </div>

    <!-- Init script -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
